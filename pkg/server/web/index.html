<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PathProbe</title>
  <link rel="stylesheet" href="/style.css">
  <link rel="stylesheet" href="/leaflet.css">
</head>
<body>

<header class="site-header">
  <div class="header-inner">
    <h1>PathProbe</h1>
    <span class="version-badge" id="version-badge"></span>
  </div>
</header>

<main class="main">

  <!-- ── Diagnostic Form ─────────────────────────────────────────────── -->
  <section class="card">
    <h2 class="card-title">Run Diagnostic</h2>

    <div class="form-grid">
      <div class="field-group">
        <label for="target">Target</label>
        <select id="target" onchange="onTargetChange()">
          <option value="web">web — Public IP &amp; DNS</option>
          <option value="smtp">smtp — Mail server</option>
          <option value="imap">imap — IMAP server</option>
          <option value="pop">pop — POP3 server</option>
          <option value="ftp">ftp — FTP / FTPS</option>
          <option value="sftp">sftp — SFTP / SSH</option>
        </select>
      </div>

      <div class="field-group">
        <label for="host">Target Host</label>
        <input type="text" id="host" placeholder="e.g. google.com">
      </div>

      <div class="field-group">
        <label for="ports">Ports <small>(comma-separated)</small></label>
        <input type="text" id="ports" placeholder="443">
      </div>
    </div>

    <!-- web-specific fields -->
    <fieldset class="target-fields" id="fields-web">
      <legend>Web / DNS Options</legend>
      <div class="form-grid">
        <div class="field-group">
          <label for="dns-domains">DNS Domains <small>(comma-separated)</small></label>
          <input type="text" id="dns-domains" value="example.com" placeholder="example.com,google.com">
        </div>
        <div class="field-group">
          <label>Record Types</label>
          <div class="checkbox-row">
            <label><input type="checkbox" id="dns-A"    checked> A</label>
            <label><input type="checkbox" id="dns-AAAA" checked> AAAA</label>
            <label><input type="checkbox" id="dns-MX"   checked> MX</label>
          </div>
        </div>
        <div class="field-group">
          <label for="http-url">HTTP URL <small>(optional probe)</small></label>
          <input type="text" id="http-url" placeholder="https://example.com">
        </div>
      </div>
    </fieldset>

    <!-- smtp-specific fields -->
    <fieldset class="target-fields" id="fields-smtp" hidden>
      <legend>SMTP Options</legend>
      <div class="form-grid">
        <div class="field-group">
          <label for="smtp-domain">EHLO Domain</label>
          <input type="text" id="smtp-domain" placeholder="example.com" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="smtp-user">Username</label>
          <input type="text" id="smtp-user" placeholder="user@example.com" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="smtp-pass">Password</label>
          <input type="password" id="smtp-pass" autocomplete="new-password">
        </div>
        <div class="field-group">
          <label for="smtp-from">MAIL FROM</label>
          <input type="text" id="smtp-from" placeholder="sender@example.com">
        </div>
        <div class="field-group">
          <label for="smtp-to">RCPT TO <small>(comma-separated)</small></label>
          <input type="text" id="smtp-to" placeholder="recipient@example.com">
        </div>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" id="smtp-starttls" checked> STARTTLS</label>
        <label><input type="checkbox" id="smtp-ssl"> Implicit TLS (SMTPS)</label>
        <label><input type="checkbox" id="smtp-mx-all"> Probe all MX records</label>
      </div>
    </fieldset>

    <!-- ftp-specific fields -->
    <fieldset class="target-fields" id="fields-ftp" hidden>
      <legend>FTP / FTPS Options</legend>
      <div class="form-grid">
        <div class="field-group">
          <label for="ftp-user">Username <small>(blank = anonymous)</small></label>
          <input type="text" id="ftp-user" placeholder="anonymous" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="ftp-pass">Password</label>
          <input type="password" id="ftp-pass" autocomplete="new-password">
        </div>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" id="ftp-ssl"> Implicit FTPS (port 990)</label>
        <label><input type="checkbox" id="ftp-auth-tls"> Explicit FTPS (AUTH TLS)</label>
        <label><input type="checkbox" id="ftp-list"> Attempt PASV + LIST</label>
      </div>
    </fieldset>

    <!-- sftp-specific fields -->
    <fieldset class="target-fields" id="fields-sftp" hidden>
      <legend>SFTP / SSH Options</legend>
      <div class="form-grid">
        <div class="field-group">
          <label for="sftp-user">Username</label>
          <input type="text" id="sftp-user" autocomplete="off">
        </div>
        <div class="field-group">
          <label for="sftp-pass">Password</label>
          <input type="password" id="sftp-pass" autocomplete="new-password">
        </div>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" id="sftp-ls"> List remote default directory</label>
      </div>
    </fieldset>

    <!-- advanced options (shared, collapsible) -->
    <details class="advanced-opts">
      <summary>Advanced Options</summary>
      <div class="form-grid adv-grid">
        <div class="field-group">
          <label for="mtr-count">MTR Count</label>
          <input type="number" id="mtr-count" value="5" min="1" max="50">
        </div>
        <div class="field-group">
          <label for="diag-timeout">Timeout</label>
          <input type="text" id="diag-timeout" value="30s" placeholder="30s">
        </div>
      </div>
      <div class="checkbox-row">
        <label><input type="checkbox" id="insecure"> Skip TLS certificate verification</label>
      </div>
    </details>

    <div class="form-actions">
      <button id="run-btn" onclick="runDiag()">&#9654; Run Diagnostic</button>
    </div>
  </section>

  <!-- ── Error Banner ─────────────────────────────────────────────────── -->
  <div class="error-banner" id="error-banner" hidden></div>

  <!-- ── Progress Log (visible during streaming run) ──────────────────── -->
  <div class="progress-log" id="progress-log" hidden></div>

  <!-- ── Results ──────────────────────────────────────────────────────── -->
  <section class="card" id="results" hidden>
    <h2 class="card-title">Results</h2>
    <div id="results-inner"></div>    <div id="geo-map" aria-label="Geo location map"></div>
  </section>

  <!-- ── History ──────────────────────────────────────────────────── -->
  <section class="card" id="history-panel">
    <h2 class="card-title">Diagnostic History</h2>
    <p class="history-empty" id="history-empty">No diagnostics run yet.</p>
    <ul class="history-list" id="history-list" hidden></ul>  </section>

</main>

<script src="/leaflet.js" defer></script>
<script src="/app.js" defer></script>
</body>
</html>
